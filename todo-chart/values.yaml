# todo-app-chart/values.yaml

# Глобальные настройки для всех сервисов
global:
  imageRegistry: "radiodnov"
  imageTag: "1.0.0"

# Список наших микросервисов с их уникальными параметрами
microservices:
  user-service:
    port: 8081
    dbName: "user_db"
    dbBouncer: "pgbouncer-user"
    resources:
      requestMemory: "256Mi"
      limitMemory: "512Mi"

  task-service:
    port: 8082
    dbName: "task_db"
    dbBouncer: "pgbouncer-task"
    resources:
      requestMemory: "256Mi"
      limitMemory: "512Mi"

  analytics-service:
    port: 8085
    dbName: "analytics_db"
    dbBouncer: "pgbouncer-analytics"
    resources:
      requestMemory: "512Mi"
      limitMemory: "1Gi"

  api-gateway:
    port: 8080
    resources:
      requestMemory: "128Mi"
      limitMemory: "256Mi"
