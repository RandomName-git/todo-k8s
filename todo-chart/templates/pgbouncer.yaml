{{- if .Values.pgbouncer.enabled }}
  {{- range .Values.databases }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-{{ .name }}-config
  namespace: {{ include "todo-chart.namespace" $ }}
data:
  pgbouncer.ini: |
    [databases]
    {{ .dbName }} = host=postgres-{{ .name }} port=5432 dbname={{ .dbName }}

    [pgbouncer]
    listen_port = 5432
    listen_addr = 0.0.0.0
    auth_type = trust
    auth_file = /etc/pgbouncer/userlist.txt
    pool_mode = {{ $.Values.pgbouncer.poolMode }}
    max_client_conn = {{ $.Values.pgbouncer.maxClientConn }}
    default_pool_size = {{ $.Values.pgbouncer.defaultPoolSize }}
    server_idle_timeout = 600
    server_lifetime = 3600
    query_timeout = 30
    idle_transaction_timeout = 60

  userlist.txt: |
    "postgres" "postgres"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: pgbouncer-{{ .name }}
  namespace: {{ include "todo-chart.namespace" $ }}
  labels:
    app: pgbouncer-{{ .name }}
    component: pgbouncer
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgbouncer-{{ .name }}
  template:
    metadata:
      labels:
        app: pgbouncer-{{ .name }}
    spec:
      containers:
        - name: pgbouncer
          image: {{ $.Values.pgbouncer.image }}
          ports:
            - containerPort: 5432
          env:
            - name: DB_USER
              value: postgres
            - name: DB_PASSWORD
              value: postgres
            - name: DB_HOST
              value: postgres-{{ .name }}
            - name: DB_PORT
              value: "5432"
            - name: DB_NAME
              value: {{ .dbName }}
            - name: POOL_MODE
              value: {{ $.Values.pgbouncer.poolMode }}
            - name: MAX_CLIENT_CONN
              value: {{ $.Values.pgbouncer.maxClientConn | quote }}
            - name: DEFAULT_POOL_SIZE
              value: {{ $.Values.pgbouncer.defaultPoolSize | quote }}
          resources:
            {{- toYaml $.Values.pgbouncer.resources | nindent 12 }}
          readinessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            tcpSocket:
              port: 5432
            initialDelaySeconds: 15
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/pgbouncer
      volumes:
        - name: config
          configMap:
            name: pgbouncer-{{ .name }}-config
---
apiVersion: v1
kind: Service
metadata:
  name: pgbouncer-{{ .name }}
  namespace: {{ include "todo-chart.namespace" $ }}
  labels:
    app: pgbouncer-{{ .name }}
    component: pgbouncer
spec:
  ports:
    - port: 5432
      targetPort: 5432
      name: pgbouncer
  selector:
    app: pgbouncer-{{ .name }}
  {{- end }}
  {{- end }}